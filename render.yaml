## How CI/CD Works on Render (Automatic!)

Render has **built-in CI/CD** — no GitHub Actions needed:
```
You push to master
      ↓
Render detects the push automatically
      ↓
Runs: yarn install && yarn build
      ↓
Runs: yarn start
      ↓
Zero-downtime deploy ✅